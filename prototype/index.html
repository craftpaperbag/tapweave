<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TapWeave - だらだらつむいで、世界をカラフルに。</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 設定パネル（オーバーレイ） -->
  <div id="settings-overlay" class="settings-overlay hidden">
    <div class="settings-panel">
      <h2>設定</h2>

      <label for="api-key-input">Gemini API キー</label>
      <div class="api-key-row">
        <input type="password" id="api-key-input" placeholder="AIza...">
        <button id="toggle-key-visibility" class="icon-btn" aria-label="APIキーの表示切替">
          <span class="eye-icon">&#x1f441;</span>
        </button>
      </div>

      <label for="model-select">モデル</label>
      <select id="model-select">
        <option value="gemini-2.5-flash" selected>Gemini 2.5 Flash（高速・推奨）</option>
        <option value="gemini-2.5-flash-lite">Gemini 2.5 Flash Lite（最速・低コスト）</option>
        <option value="gemini-2.5-pro">Gemini 2.5 Pro（高品質）</option>
        <option value="gemini-3-flash-preview">Gemini 3 Flash（最新・プレビュー）</option>
        <option value="gemini-3.1-pro-preview">Gemini 3.1 Pro（最高品質・プレビュー）</option>
      </select>

      <label for="suggestion-count">提案数</label>
      <select id="suggestion-count">
        <option value="3" selected>3個</option>
        <option value="5">5個</option>
      </select>

      <div class="settings-actions">
        <button id="save-settings" class="btn-primary">保存して始める</button>
        <button id="close-settings" class="btn-secondary">閉じる</button>
      </div>

      <p class="settings-note">APIキーはこの端末のブラウザにのみ保存されます。サーバーには送信されません。</p>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="app">
    <!-- ヘッダー -->
    <header class="app-header">
      <h1 class="app-title">TapWeave</h1>
      <div class="header-actions">
        <button id="clear-btn" class="icon-btn" aria-label="クリア" title="書き直す">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14"/>
          </svg>
        </button>
        <button id="copy-btn" class="icon-btn" aria-label="コピー" title="コピー">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" aria-label="設定" title="設定">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 執筆エリア -->
    <div id="writing-area" class="writing-area" contenteditable="true" data-placeholder="ここをタップして、思いつくままに..."></div>

    <!-- ステータス表示 -->
    <div id="status-bar" class="status-bar">
      <span id="char-count">0文字</span>
      <span class="status-right">
        <span id="ai-timestamp"></span>
        <span id="ai-status"></span>
      </span>
    </div>

    <!-- AI提案チップエリア -->
    <div id="suggestions-area" class="suggestions-area">
      <div id="suggestion-chips" class="suggestion-chips">
        <!-- 初期テーマ提案（空白状態用） -->
      </div>
    </div>
  </div>

  <script src="js/gemini.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
